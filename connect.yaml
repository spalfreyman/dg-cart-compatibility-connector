deployAs:
  - name: service
    applicationType: service
    endpoint: /cart-compatibility
    scripts:
      postDeploy: npm install && node connector/post-deploy.js
      preUndeploy: npm install && node connector/pre-undeploy.js
    configuration:
      standardConfiguration:
        - key: CT_PROJECT_KEY
          description: commercetools project key
          required: true
          default: dg_testbed
        - key: CT_AUTH_URL
          description: commercetools auth URL
          required: true
          default: https://auth.europe-west1.gcp.commercetools.com
        - key: CT_API_URL
          description: commercetools API URL
          required: true
          default: https://api.europe-west1.gcp.commercetools.com
        - key: CT_SCOPE
          description: API client scope (e.g. manage_project:dg_testbed)
          required: true
      securedConfiguration:
        - key: CT_CLIENT_ID
          description: API client ID
          required: true
        - key: CT_CLIENT_SECRET
          description: API client secret
          required: true
        - key: EXTENSION_SECRET
          description: Shared secret used to authenticate requests from commercetools to this extension
          required: true
