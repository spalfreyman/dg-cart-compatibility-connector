deployAs:
  - name: service
    applicationType: service
    endpoint: /cart-compatibility
    scripts:
      postDeploy: npm install && npm run build && npm run connector:post-deploy
      preUndeploy: npm install && npm run build && npm run connector:pre-undeploy
    configuration:
      standardConfiguration:
        - key: CTP_PROJECT_KEY
          description: commercetools project key
          required: true
        - key: CTP_AUTH_URL
          description: commercetools auth URL (e.g. https://auth.europe-west1.gcp.commercetools.com)
          required: true
        - key: CTP_API_URL
          description: commercetools API URL (e.g. https://api.europe-west1.gcp.commercetools.com)
          required: true
        - key: CTP_SCOPE
          description: API client scope (e.g. manage_project:your-project-key)
          required: true
      securedConfiguration:
        - key: CTP_CLIENT_ID
          description: commercetools API client ID
          required: true
        - key: CTP_CLIENT_SECRET
          description: commercetools API client secret
          required: true
        - key: EXTENSION_SECRET
          description: Shared secret used to authenticate requests from commercetools to this extension
          required: true
